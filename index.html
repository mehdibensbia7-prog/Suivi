<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Suivi Pro - MINT</title>
    <!-- Bibliothèques -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .nav { margin-bottom: 20px; }
        .tab-content { display: none; padding: 20px; background: #fff; border: 1px solid #ccc; }
        .active { display: block; }
        #table-container { margin-top: 20px; }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="showTab('suivi')">Onglet 1 : Suivi des Ventes</button>
        <button onclick="showTab('import')">Onglet 2 : Importation</button>
    </div>

    <div id="suivi" class="tab-content active">
        <h2>Tableau de Bord de Suivi</h2>
        <div id="table-container"></div>
    </div>

    <div id="import" class="tab-content">
        <h2>Charger fichier Excel (.xlsx)</h2>
        <input type="file" id="fileInput" accept=".xlsx" />
        <button onclick="processFile()">Afficher dans Suivi</button>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function processFile() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // Conversion en JSON
                let jsonData = XLSX.utils.sheet_to_json(sheet);
                
                // Nettoyage : supprimer les colonnes "Unnamed"
                jsonData = jsonData.map(row => {
                    const cleanRow = {};
                    Object.keys(row).forEach(key => {
                        if (!key.startsWith("Unnamed")) {
                            cleanRow[key] = row[key];
                        }
                    });
                    return cleanRow;
                });

                // Affichage
                new Tabulator("#table-container", {
                    data: jsonData,
                    autoColumns: true,
                    layout: "fitColumns",
                    editor: "input"
                });
                showTab('suivi');
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
