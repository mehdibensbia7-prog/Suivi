<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Centre d'Appel - Gestion Ventes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .nav { margin-bottom: 20px; display: flex; gap: 10px; }
        .tab-content { display: none; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .active { display: block; }
        #table-container { margin-top: 20px; min-height: 300px; }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="showTab('suivi')">Onglet 1 : Suivi des Ventes</button>
        <button onclick="showTab('convert')">Onglet 2 : Importation</button>
    </div>

    <div id="suivi" class="tab-content active">
        <h2>Tableau de Bord de Suivi</h2>
        <div id="table-container"></div>
    </div>

    <div id="convert" class="tab-content">
        <h2>Charger vos fichiers</h2>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.pdf" />
        <button onclick="processFile()">Charger les données</button>
        <p><small>Note : Utilisez un fichier Excel pour une lecture directe. Les PDF seront lus sous forme de texte brut.</small></p>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function initTable(data) {
            const container = document.getElementById('table-container');
            container.innerHTML = ""; // Nettoyage
            new Tabulator("#table-container", {
                data: data,
                autoColumns: true,
                layout: "fitColumns",
                pagination: "local",
                paginationSize: 20,
                columnDefaults: { editor: "input", bottomCalc: "sum" }
            });
            showTab('suivi');
        }

        function processFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Veuillez sélectionner un fichier.");

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    initTable(jsonData);
                } catch (err) {
                    alert("Erreur : Le fichier n'est pas un format Excel valide.");
                }
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
