<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIPP - MINT & ConsoPilote</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #16213e; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>Pilotage de Performance Opérationnelle</h1>
    <div class="card">
        <input type="file" id="fileInput" accept=".xlsx" />
        <button onclick="calculateCommissions()">Générer Paie & Commissions</button>
    </div>
    <div class="grid-container" style="margin-top:20px;">
        <div id="suivi-container" class="card"><h2>Suivi Ventes</h2></div>
        <div id="finance-container" class="card"><h2>Synthèse Financière</h2></div>
    </div>

    <script>
        let tableVentes, tableFinance;

        function calculateCommissions() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                let ventes = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                
                // Moteur de calcul simple pour la démonstration
                let finance = ventes.map(v => {
                    let type = v['Type de Contrat'] || "";
                    let commission = (type.includes('Mint')) ? 50 : 100;
                    return { Agent: v['Nom du Commercial'], Type: type, Commission: commission };
                });

                tableVentes = new Tabulator("#suivi-container", {data: ventes, autoColumns: true});
                tableFinance = new Tabulator("#finance-container", {data: finance, autoColumns: true});
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
