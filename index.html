<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIPP - Dashboard Management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; padding: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-content { display: none; padding: 20px; background: #16213e; border-radius: 12px; }
        .active { display: block; }
        button { padding: 10px 20px; cursor: pointer; background: #3498db; border: none; border-radius: 5px; color: white; }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="showTab('suivi')">Suivi & Édition</button>
        <button onclick="showTab('kpi')">KPI Performance</button>
    </div>

    <div id="suivi" class="tab-content active">
        <input type="file" id="fileInput" />
        <select id="sheetSelector" onchange="loadSheet()"><option value="">Choisir une feuille</option></select>
        <button onclick="saveModifications()">Sauvegarder</button>
        <div id="table-container" style="margin-top:20px; min-height: 200px;"></div>
    </div>

    <div id="kpi" class="tab-content">
        <h2>Analyse Performance</h2>
        <div id="kpi-container" style="min-height: 200px;"></div>
    </div>

    <script>
        let workbook = null;

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = new Uint8Array(ev.target.result);
                    workbook = XLSX.read(data, {type: 'array'});
                    const s = document.getElementById('sheetSelector');
                    s.innerHTML = '<option value="">Choisir une feuille</option>';
                    workbook.SheetNames.forEach(n => {
                        let opt = document.createElement('option');
                        opt.value = n; opt.innerHTML = n;
                        s.appendChild(opt);
                    });
                    alert("Fichier chargé avec succès !");
                } catch(err) { alert("Erreur lecture fichier : " + err); }
            };
            reader.readAsArrayBuffer(file);
        });

        function loadSheet() {
            const name = document.getElementById('sheetSelector').value;
            if(!name) return;
            const data = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
            
            // Initialisation forcée
            const table = new Tabulator("#table-container", {
                data: data,
                autoColumns: true,
                layout: "fitColumns"
            });

            // Calcul KPI
            const kpi = data.reduce((acc, row) => {
                let ag = row['Nom du Commercial'];
                if(!ag) return acc;
                if(!acc[ag]) acc[ag] = {Agent: ag, Ventes: 0, Annulations: 0};
                acc[ag].Ventes++;
                if(row['Status'] === 'Annulé') acc[ag].Annulations++;
                return acc;
            }, {});
            
            new Tabulator("#kpi-container", { data: Object.values(kpi), autoColumns: true });
        }

        function saveModifications() {
            alert("Sauvegarde lancée...");
        }
    </script>
</body>
</html>
