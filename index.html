<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Suivi Ventes Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
</head>
<body>
    <h2>Interface de Suivi (Veuillez utiliser des fichiers .xlsx)</h2>
    <input type="file" id="fileInput" accept=".xlsx" />
    <div id="table-container"></div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const wb = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                
                new Tabulator("#table-container", {
                    data: data,
                    autoColumns: true, // Crée les colonnes selon votre fichier Excel
                    layout: "fitColumns",
                    editor: "input" // Permet de modifier chaque cellule
                });
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
