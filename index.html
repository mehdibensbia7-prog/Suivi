<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIPP - Pilotage Intégral</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
        .summary-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; padding: 20px; background: #1e293b; border-radius: 10px; border: 1px solid #3498db; }
        .stat { font-size: 1.4em; font-weight: bold; color: #3498db; }
        .error { color: #f87171; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>SIPP - Gestion Financière & Performance</h1>
    <div class="summary-box">
        <div>MINT à Payer : <span id="mint-apayer" class="stat">0 DH</span></div>
        <div>CONSO à Payer : <span id="conso-apayer" class="stat">0 DH</span></div>
        <div>Total Payé : <span id="total-paye" class="stat">0 DH</span></div>
    </div>

    <input type="file" id="fileInput" accept=".xlsx" />
    <div id="error-msg" class="error"></div>
    <div id="table-paie" style="margin-top:20px;"></div>

    <script>
        let table;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    
                    const processed = data.map(r => {
                        let status = String(r['Status'] || "").toLowerCase();
                        let date = moment(r['Date de Vente'], 'DD/MM/YYYY');
                        
                        // Calculs MINT
                        let mintQty = (String(r['Numéro Contrat Energie'] || "").match(/\d{7}/g) || []).length;
                        let mintComm = (mintQty * 50) + (status === 'activé' ? 150 : 0) - (['annulé', 'rétracté', 'résilié'].includes(status) ? 150 : 0);
                        
                        // Calculs CONSO
                        let isConso = String(r['Numéro Contrat ConsoPilote'] || "").trim() !== "";
                        let consoComm = isConso ? (100 + (moment().diff(date, 'months') >= 1 ? 50 : 0) + (moment().diff(date, 'months') >= 2 ? 50 : 0)) : 0;
                        
                        return {
                            ...r,
                            Montant_Mint: mintComm,
                            Montant_Conso: consoComm,
                            Etat_Mint: "Non Payé",
                            Etat_Conso: "Non Payé"
                        };
                    });

                    table = new Tabulator("#table-paie", {
                        data: processed,
                        columns: [
                            {title: "Agent", field: "Nom du Commercial"},
                            {title: "MINT", field: "Montant_Mint", hozAlign: "center"},
                            {title: "Statut MINT", field: "Etat_Mint", editor: "select", editorParams: {values: ["Non Payé", "Payé"]}},
                            {title: "CONSO", field: "Montant_Conso", hozAlign: "center"},
                            {title: "Statut CONSO", field: "Etat_Conso", editor: "select", editorParams: {values: ["Non Payé", "Payé"]}},
                        ],
                        cellEdited: updateBalance
                    });
                    updateBalance();
                } catch(err) { document.getElementById('error-msg').innerText = "Erreur de traitement : " + err.message; }
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function updateBalance() {
            let m = 0, c = 0, p = 0;
            table.getData().forEach(row => {
                if (row.Etat_Mint === "Non Payé") m += row.Montant_Mint; else p += row.Montant_Mint;
                if (row.Etat_Conso === "Non Payé") c += row.Montant_Conso; else p += row.Montant_Conso;
            });
            document.getElementById('mint-apayer').innerText = m + " DH";
            document.getElementById('conso-apayer').innerText = c + " DH";
            document.getElementById('total-paye').innerText = p + " DH";
        }
    </script>
</body>
</html>
