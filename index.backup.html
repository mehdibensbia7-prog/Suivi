<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIPP - Pilotage Global Intégral</title>
    <script>
        window.__xlsxLoadFailed = false;
        window.__xlsxFallbackAttempted = false;
        function loadLocalXlsxFallback() {
            if (window.XLSX || window.__xlsxFallbackAttempted) return;
            window.__xlsxFallbackAttempted = true;
            const fallbackScript = document.createElement('script');
            fallbackScript.src = 'xlsx.full.min.js';
            fallbackScript.onload = () => console.log('SheetJS local fallback loaded.');
            fallbackScript.onerror = () => console.warn('SheetJS local fallback failed.');
            document.head.appendChild(fallbackScript);
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" onerror="window.__xlsxLoadFailed=true; loadLocalXlsxFallback();"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-content { display: none; padding: 20px; background: #1e293b; border-radius: 10px; }
        .active { display: block; }
        .summary-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; padding: 15px; background: #0f172a; border: 1px solid #3498db; }
        .stat { font-size: 1.2em; font-weight: bold; color: #3498db; }
        .error { color: #f87171; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>SIPP - Pilotage Global & Trésorerie</h1>
    <div class="nav">
        <button onclick="showTab('suivi')">Opérationnel</button>
        <button onclick="showTab('finance')">Trésorerie</button>
        <button onclick="showTab('kpi')">KPI Performance</button>
    </div>

    <input type="file" id="fileInput" />
    <select id="sheetSelector" onchange="processData()"><option value="">Choisir une feuille</option></select>
    <div id="error-msg" class="error"></div>

    <div id="suivi" class="tab-content active"><div id="table-suivi"></div></div>
    <div id="finance" class="tab-content">
        <div class="summary-box">
            <div>MINT à Payer : <span id="mint-apayer" class="stat">0 DH</span></div>
            <div>CONSO à Payer : <span id="conso-apayer" class="stat">0 DH</span></div>
            <div>TOTAL PAYÉ : <span id="total-paye" class="stat">0 DH</span></div>
        </div>
        <div id="table-finance"></div>
    </div>
    <div id="kpi" class="tab-content"><div id="table-kpi"></div></div>

    <script>
        let wb = null;
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
                    const s = document.getElementById('sheetSelector');
                    s.innerHTML = '<option value="">Choisir une feuille</option>';
                    wb.SheetNames.forEach(n => s.innerHTML += `<option value="${n}">${n}</option>`);
                } catch(err) {
                    document.getElementById('error-msg').innerText = "Erreur fichier";
                }
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function processData() {
            const name = document.getElementById('sheetSelector').value;
            if(!name) return;
            const data = XLSX.utils.sheet_to_json(wb.Sheets[name]);
            
            new Tabulator("#table-suivi", { 
                data: data.map(r => ({
                    ...r, 
                    Statut_Energie: r.Statut_Energie || "N/A", 
                    Statut_Conso: r.Statut_Conso || "N/A"
                })), 
                autoColumns: true,
                columns: [
                    {title: "Statut Énergie", field: "Statut_Energie", editor: "select", editorParams: {values: ["Activé", "Annulé", "Résilé", "Rétracté", "Refusé"]}},
                    {title: "Statut Conso", field: "Statut_Conso", editor: "select", editorParams: {values: ["Activé", "Annulé", "Résilé", "Rétracté", "Refusé"]}}
                ]
            });

            const proc = data.map(r => {
                let statusE = String(r.Statut_Energie || r['Status'] || "").toLowerCase();
                let statusC = String(r.Statut_Conso || r['Status'] || "").toLowerCase();
                let date = moment(r['Date de Vente'], 'DD/MM/YYYY');
                
                let units = (String(r['Numéro Contrat Energie'] || "").match(/\d{7}/g) || []).length;
                let mint = (units * 50) + (statusE === 'activé' ? 150 : 0) - (['annulé', 'résilé', 'rétracté', 'refusé'].includes(statusE) ? 150 : 0);
                
                let isConso = String(r['Numéro Contrat ConsoPilote'] || "").trim() !== "";
                let conso = isConso ? (100 + (moment().diff(date, 'months') >= 1 ? 50 : 0) + (moment().diff(date, 'months') >= 2 ? 50 : 0)) : 0;
                if(['annulé', 'résilé', 'rétracté', 'refusé'].includes(statusC)) conso = 0;

                return {...r, Montant_Mint: mint, Montant_Conso: conso, Etat_Mint: "Non Payé", Etat_Conso: "Non Payé"};
            });

            new Tabulator("#table-finance", {
                data: proc,
                columns: [
                    {title: "Agent", field: "Nom du Commercial"},
                    {title: "MINT", field: "Montant_Mint"},
                    {title: "Statut MINT", field: "Etat_Mint", editor: "select", editorParams: {values: ["Non Payé", "Payé"]}},
                    {title: "CONSO", field: "Montant_Conso"},
                    {title: "Statut CONSO", field: "Etat_Conso", editor: "select", editorParams: {values: ["Non Payé", "Payé"]}},
                ],
                cellEdited: updateBalance
            });

            const kpi = data.reduce((acc, r) => {
                let ag = r['Nom du Commercial'];
                if(!acc[ag]) acc[ag] = {Agent: ag, Ventes: 0, Annulations: 0};
                acc[ag].Ventes++;
                if(['annulé', 'résilé', 'rétracté', 'refusé'].includes(String(r['Status']).toLowerCase())) acc[ag].Annulations++;
                return acc;
            }, {});
            new Tabulator("#table-kpi", { data: Object.values(kpi), autoColumns: true });
            updateBalance();
        }

        function updateBalance() {
            let m = 0, c = 0, p = 0;
            Tabulator.findTable("#table-finance")[0].getData().forEach(row => {
                if(row.Etat_Mint === "Non Payé") m += row.Montant_Mint; else p += row.Montant_Mint;
                if(row.Etat_Conso === "Non Payé") c += row.Montant_Conso; else p += row.Montant_Conso;
            });
            document.getElementById('mint-apayer').innerText = m + " DH";
            document.getElementById('conso-apayer').innerText = c + " DH";
            document.getElementById('total-paye').innerText = p + " DH";
        }
    </script>
</body>
</html>
